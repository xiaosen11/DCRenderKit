name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ═══════════════════════════════════════════════════════════════
  # Build & test the SDK
  # ═══════════════════════════════════════════════════════════════
  # DCRenderKit is an iOS-only SDK at the business layer; macOS is
  # retained as a swift-test host purely because macos-15 runners
  # give us a real Metal GPU so the 300+ shader-driven unit tests
  # actually execute. We don't ship any macOS business APIs
  # (no NSImage path), so only the `swift test` runner is useful —
  # a macOS-framework build in CI would be dead weight.
  #
  # iOS coverage: xcodebuild builds the SDK scheme and the Demo
  # project against an iPhone Simulator destination. The simulator
  # has no real Metal GPU so we don't run `xcodebuild test` there;
  # the macOS `swift test` covers all Metal-heavy assertions.
  # ═══════════════════════════════════════════════════════════════
  test:
    name: swift test (Metal)
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        # DCRenderKit targets Swift 6.0 / iOS 18.0+ ⇒ Xcode 16+ is
        # the minimum. macos-15 runners ship Xcode 16.x; pick the
        # highest 16.x found so the step is robust across runner-
        # image refreshes (Xcode_16.app → Xcode_16.2.app etc.).
        run: |
          XCODE=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$XCODE" ]; then sudo xcode-select -s "$XCODE"; fi
          xcodebuild -version

      - name: Show environment
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve dependencies
        run: swift package resolve

      - name: swift build
        # `-Xswiftc -warnings-as-errors` makes any Swift warning fail
        # the build so the SDK's zero-warning invariant is preserved
        # PR-by-PR. Covered locally by the #72 audit; the flag keeps
        # that audit from regressing.
        run: swift build -v -Xswiftc -warnings-as-errors

      # ─── swift test runs one class per process ─────────────────
      # Running the whole suite in a single `swift test` deterministically
      # SIGSEGVs on macos-15.7.4 / Xcode 16.4 / Swift 6.1.2. The crash
      # arrives on a background thread (~250 ms into a test that itself
      # runs in 0 ms), so it must be a leaked Metal `addCompletedHandler`
      # from an earlier test class accessing freed state — most likely
      # because 23 separate test files share `ShaderLibrary.shared`
      # via `unregisterAll()` + `register()` in their setUp.
      #
      # Diagnostic CI run 24958941214 confirmed the bug is cross-test
      # interaction, not any individual test: every class passes when
      # run alone. Refactoring 23 test files to use a private library
      # would require teaching dispatchers to accept a library instance
      # (large refactor); changing `ShaderLibrary.unregisterAll` to
      # synchronously drain the GPU would mutate a public-API
      # behavioral contract.
      #
      # The pragmatic fix: enumerate every test class and run each in
      # its own `swift test` process. Each invocation gets a fresh
      # `ShaderLibrary.shared` singleton, no cross-test pollution
      # possible. Adds ~30-60 s to CI for 64 process spawns; acceptable
      # for the reliability gain.
      - name: swift test — one class per process
        run: |
          set -e
          # Discover every test class (e.g. "DCRenderKitTests.LoweringTests").
          classes=$(swift test list --disable-swift-testing 2>/dev/null \
            | grep "^DCRenderKitTests\." \
            | awk -F'/' '{print $1}' \
            | sort -u)
          count=$(echo "$classes" | wc -l | tr -d ' ')
          echo "Discovered $count test classes; running each in its own process."
          # MultiPassExecutorTests previously SIGSEGV'd on
          # macos-15.7.4 / Xcode 16.4 / Swift 6.1.2 due to the
          # ShaderLibrary.shared / TexturePool race exposed by tearDown
          # nil'ing pool refs while completion handlers were still
          # in flight. The Phase 1 multi-Pipeline refactor (commit
          # f8b332d) gave each Pipeline its own injected resources,
          # which removed the cross-test pollution path. We now run
          # MultiPassExecutorTests like every other class — if it
          # regresses, the per-class isolation gives us a precise
          # failure signal.
          failed_classes=""
          for class in $classes; do
            echo "::group::$class"
            if swift test -Xswiftc -warnings-as-errors --disable-swift-testing --filter "${class}/"; then
              echo "::endgroup::"
            else
              echo "::endgroup::"
              echo "::error title=swift test failure::class $class failed"
              failed_classes="$failed_classes $class"
            fi
          done
          if [ -n "$failed_classes" ]; then
            echo "::error::failed classes:$failed_classes"
            exit 1
          fi

  ios-build:
    name: Build (iOS Simulator)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$XCODE" ]; then sudo xcode-select -s "$XCODE"; fi

      - name: Build SDK (iOS Simulator)
        run: |
          xcodebuild build \
            -scheme DCRenderKit \
            -destination 'generic/platform=iOS Simulator' \
            -skipPackagePluginValidation

      - name: Build Demo (iOS Simulator)
        run: |
          xcodebuild build \
            -project Examples/DCRDemo/DCRDemo.xcodeproj \
            -scheme DCRDemo \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug

  # ═══════════════════════════════════════════════════════════════
  # DocC → GitHub Pages
  # ═══════════════════════════════════════════════════════════════
  # Builds the DocC catalog (Sources/DCRenderKit/DCRenderKit.docc)
  # via `xcodebuild docbuild` — we deliberately do not depend on
  # swift-docc-plugin because the zero-external-dependency rule
  # (see PackageManifestTests) extends to build-time plugins.
  # `xcrun docc process-archive transform-for-static-hosting` bridges
  # the generated .doccarchive into a static site that deploy-pages
  # can serve.
  #
  # Only runs on main so PR CI stays fast; the published Pages site
  # is therefore a snapshot of the latest merged commit.
  docs:
    name: DocC → GitHub Pages
    runs-on: macos-15
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$XCODE" ]; then sudo xcode-select -s "$XCODE"; fi

      - name: Build DocC archive
        run: |
          xcodebuild docbuild \
            -scheme DCRenderKit \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath .derivedData \
            -skipPackagePluginValidation

      - name: Transform for static hosting
        run: |
          ARCHIVE=$(find .derivedData -name "DCRenderKit.doccarchive" -type d | head -1)
          if [ -z "$ARCHIVE" ]; then
            echo "::error::DocC archive not found under .derivedData"
            exit 1
          fi
          mkdir -p docs-site
          xcrun docc process-archive transform-for-static-hosting \
            "$ARCHIVE" \
            --hosting-base-path DCRenderKit \
            --output-path ./docs-site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs-site

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ═══════════════════════════════════════════════════════════════
  # Source hygiene
  # ═══════════════════════════════════════════════════════════════
  # Enforces two rules human reviewers can miss:
  #
  #   1. No unreferenced FIXME / TODO. The project convention is that
  #      every FIXME / TODO must be annotated with either a plan-
  #      section reference like `(§8.6 Tier 2)` or an issue number
  #      like `(#42)`. That keeps the codebase's outstanding tech
  #      debt explicitly linked to the place where the resolution
  #      is tracked. A bare `// TODO: …` always indicates that the
  #      author lost track of the follow-up.
  #
  #   2. No `.package(url:` anywhere in Package.swift. This is the
  #      zero-external-dependency contract, also enforced at swift-
  #      test time by PackageManifestTests.testPackageHasNoExternal-
  #      Dependencies. The CI check is redundant with the test but
  #      catches the violation without even needing to compile.
  # ═══════════════════════════════════════════════════════════════
  lint:
    name: Lint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: No unreferenced FIXME / TODO / HACK
        run: |
          # Find FIXME/TODO/HACK markers that lack a `(§…)` or `(#…)`
          # reference inside the same line. grep -P available via
          # Homebrew `grep` if system grep lacks it; on runner
          # images `grep -E` is enough when combined with a second
          # negated grep.
          BAD=$(grep -rn -E "FIXME|TODO|HACK" Sources/ Tests/ 2>/dev/null \
                | grep -v -E "\(§[0-9]|\(#[0-9]|// MARK:" || true)
          if [ -n "$BAD" ]; then
            echo "::error::Found unreferenced FIXME / TODO / HACK marker(s)."
            echo "Every FIXME / TODO must link to a plan section (§X.Y)"
            echo "or issue number (#NNN) so the follow-up is tracked."
            echo ""
            echo "$BAD"
            exit 1
          fi

      - name: Zero external dependencies
        run: |
          if grep -E "\.package\(" Package.swift 2>/dev/null; then
            echo "::error::Package.swift contains .package(...)."
            echo "DCRenderKit is a zero-external-dependency SDK; see"
            echo "CONTRIBUTING.md and PackageManifestTests."
            exit 1
          fi

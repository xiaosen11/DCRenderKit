name: DCRDemo

options:
  bundleIdPrefix: com.digirender
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  minimumXcodeGenVersion: "2.40.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_PREVIEWS: "YES"
    CODE_SIGN_STYLE: Automatic

packages:
  DCRenderKit:
    path: ../..

targets:
  DCRDemo:
    type: application
    platform: iOS
    sources:
      # xcodegen auto-classifies files under `sources:` by extension:
      # .swift → compile, .jpg / .cube / .xcassets → resources bundle.
      # Info.plist is explicitly excluded because it's referenced via
      # the `info.path` key below, not compiled in.
      - path: DCRDemo
        excludes:
          - "Info.plist"
    info:
      path: DCRDemo/Info.plist
      properties:
        CFBundleDisplayName: DCRDemo
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIImageRespectsSafeAreaInsets: true
        UIRequiredDeviceCapabilities:
          - armv7
          - metal
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortraitUpsideDown
        UIViewControllerBasedStatusBarAppearance: true
        NSCameraUsageDescription: "DCRDemo 需要访问相机以演示 DCRenderKit 的实时滤镜链。"
        NSPhotoLibraryAddUsageDescription: "DCRDemo 需要写入相册以演示照片编辑导出。"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.digirender.me
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        DEVELOPMENT_TEAM: TVF664WMUM
    dependencies:
      - package: DCRenderKit
        product: DCRenderKit
